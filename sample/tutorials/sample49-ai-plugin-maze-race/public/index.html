<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sample 49 Maze Race</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="hud">
      <div>
        <p class="eyebrow">Sample 49</p>
        <h1>Maze Race</h1>
      </div>
      <div class="stats" aria-live="polite">
        <span id="rankText">Race ready</span>
        <span id="ruleText">Hold Space to drive</span>
      </div>
    </header>

    <canvas id="maze" width="900" height="620" aria-label="Scrolling maze race game"></canvas>

    <footer class="controls">
      <span>Release: rotate 90 deg/sec</span>
      <span>Hold Space: drive straight</span>
      <span>Goal: center</span>
      <button id="restart" type="button">Restart</button>
    </footer>
  </main>
  <script type="module" src="game.js"></script>
</body>
</html>
