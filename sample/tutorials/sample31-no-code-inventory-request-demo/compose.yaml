name: mtool-sample-sample31-no-code-inventory-request-demo

services:
  web-admin:
    environment:
      APP_WORK_ROOT: /var/www/work/sample-packs/sample31-no-code-inventory-request-demo

  web-lab:
    environment:
      APP_WORK_ROOT: /var/www/work/sample-packs/sample31-no-code-inventory-request-demo

  db-config:
    entrypoint:
      - /bin/sh
      - -lc
      - |
        set -eu
        rm -rf /docker-entrypoint-initdb.d/*
        cp -R /docker-entrypoint-initdb-core/. /docker-entrypoint-initdb.d/
        cp -R /docker-entrypoint-initdb-sample/. /docker-entrypoint-initdb.d/
        exec docker-entrypoint.sh mariadbd
    volumes:
      - db-config-data:/var/lib/mysql
      - db-config-initdb:/docker-entrypoint-initdb.d
      - ./docker/mariadb/config-initdb:/docker-entrypoint-initdb-core:ro
      - ./sample/tutorials/sample31-no-code-inventory-request-demo/seed:/docker-entrypoint-initdb-sample:ro

volumes:
  db-config-initdb:
