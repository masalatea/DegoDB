name: mtool-sample-sample18-mini-task-board-demo

services:
  web-admin:
    environment:
      APP_WORK_ROOT: /var/www/work/sample-packs/sample18-mini-task-board-demo
      MTOOL_NO_CODE_SERVER_AVAILABILITY_OVERLAY: ${MTOOL_NO_CODE_SERVER_AVAILABILITY_OVERLAY:-}
      MTOOL_NO_CODE_TRANSACTION_FULL_GATE: ${MTOOL_NO_CODE_TRANSACTION_FULL_GATE:-}
      MTOOL_SAMPLE18_GENERATED_UI_EXECUTION_ENABLED: ${MTOOL_SAMPLE18_GENERATED_UI_EXECUTION_ENABLED:-}
      MTOOL_SAMPLE18_GENERATED_SUBMIT_MUTATION_ENABLED: ${MTOOL_SAMPLE18_GENERATED_SUBMIT_MUTATION_ENABLED:-}
      MTOOL_SAMPLE18_GENERATED_SUBMIT_EXECUTOR_ENABLED: ${MTOOL_SAMPLE18_GENERATED_SUBMIT_EXECUTOR_ENABLED:-}

  web-lab:
    environment:
      APP_WORK_ROOT: /var/www/work/sample-packs/sample18-mini-task-board-demo
      MTOOL_SAMPLE18_GENERATED_SUBMIT_MUTATION_ENABLED: ${MTOOL_SAMPLE18_GENERATED_SUBMIT_MUTATION_ENABLED:-}
      MTOOL_SAMPLE18_GENERATED_SUBMIT_EXECUTOR_ENABLED: ${MTOOL_SAMPLE18_GENERATED_SUBMIT_EXECUTOR_ENABLED:-}
      MTOOL_SAMPLE18_GENERATED_SUBMIT_RUNTIME_REFERENCE_DIR: ${MTOOL_SAMPLE18_GENERATED_SUBMIT_RUNTIME_REFERENCE_DIR:-}
      MTOOL_RUNTIME_DB_HOST: db-config
      MTOOL_RUNTIME_DB_PORT: 3306
      MTOOL_RUNTIME_DB_NAME: ${CONFIG_DB_NAME:-config_app}
      MTOOL_RUNTIME_DB_USER: ${CONFIG_DB_USER:-config_app}
      MTOOL_RUNTIME_DB_PASSWORD: ${CONFIG_DB_PASSWORD:-}

  db-config:
    entrypoint:
      - /bin/sh
      - -lc
      - |
        set -eu
        rm -rf /docker-entrypoint-initdb.d/*
        cp -R /docker-entrypoint-initdb-core/. /docker-entrypoint-initdb.d/
        cp -R /docker-entrypoint-initdb-sample/. /docker-entrypoint-initdb.d/
        exec docker-entrypoint.sh mariadbd
    volumes:
      - db-config-data:/var/lib/mysql
      - db-config-initdb:/docker-entrypoint-initdb.d
      - ./docker/mariadb/config-initdb:/docker-entrypoint-initdb-core:ro
      - ./sample/tutorials/sample18-mini-task-board-demo/seed:/docker-entrypoint-initdb-sample:ro

volumes:
  db-config-initdb:
