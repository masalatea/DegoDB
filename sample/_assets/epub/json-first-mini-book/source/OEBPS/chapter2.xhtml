<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="ja" xml:lang="ja">
  <head>
    <title>本として届ける</title>
    <link rel="stylesheet" type="text/css" href="style.css"/>
  </head>
  <body>
    <section>
      <h1>本として届ける</h1>
      <p>Webの読書画面とEPUBの配信情報は、同じ本と章のデータから説明できます。</p>
      <p>このサンプルではEPUBを生成する仕組みまでは作りません。かわりに、生成済みEPUBのURL、サイズ、チェックサム、更新日時をCMSのメタデータとして扱います。</p>
      <p>これにより、Mtoolのサンプルは小さく保ちながら、電子書籍らしい表示と配信の流れを見せられます。</p>
    </section>
  </body>
</html>
