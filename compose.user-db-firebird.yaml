    environment:
      APP_SITE: admin
      APP_CONFIG_STORE_DRIVER: firebird
      APP_CONFIG_DB_HOST: user-db-firebird
      APP_CONFIG_DB_PORT: "3050"
      APP_CONFIG_DB_NAME: "/var/lib/firebird/data/${USER_DB_FIREBIRD_DB:-lab_app.fdb}"
      APP_CONFIG_DB_USER: ${USER_DB_FIREBIRD_USER:-lab_app}
      APP_CONFIG_DB_PASSWORD: ${USER_DB_FIREBIRD_PASSWORD:-lab_app_password}
      APP_CONFIG_FIREBIRD_CHARSET: ${USER_DB_FIREBIRD_CHARSET:-UTF8}
    depends_on:
      user-db-firebird:
        condition: service_healthy
    command:
      [
        "php",
        "mtool/scripts/check_firebird_config_repository_smoke.php",
        "--pretty",
      ]

