name: mtool-user-db-pgsql

services:
  user-db-pgsql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${USER_DB_PGSQL_DB:-lab_app}
      POSTGRES_USER: ${USER_DB_PGSQL_USER:-lab_app}
      POSTGRES_PASSWORD: ${USER_DB_PGSQL_PASSWORD:-lab_app_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "${USER_DB_PGSQL_HOST_PORT:-15432}:5432"
    restart: unless-stopped
    volumes:
      - user-db-pgsql-data:/var/lib/postgresql/data

volumes:
  user-db-pgsql-data:
